resources:
  jobs:
    stock_pipeline:
      name: stock_pipeline
      schedule:
        quartz_cron_expression: 17 0 18 * * ?
        timezone_id: Europe/Copenhagen
        pause_status: PAUSED
      tasks:
        - task_key: stage
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/stocks/stage_stocks
            source: WORKSPACE
        - task_key: bronze
          depends_on:
            - task_key: stage
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/stocks/bronze_stocks
            source: WORKSPACE
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/stocks/silver_stocks
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
