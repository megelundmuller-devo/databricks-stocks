resources:
  jobs:
    news_pipeline:
      name: news_pipeline
      schedule:
        quartz_cron_expression: 0 0 18 * * ?
        timezone_id: Europe/Copenhagen
        pause_status: PAUSED
      tasks:
        - task_key: stage_news
          webhook_notifications:
            on_failure:
              - id: REPLACE_WITH_NOTIFICATION_DESTINATION_ID
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/news/stage_news
            source: WORKSPACE
        - task_key: bronze_news
          depends_on:
            - task_key: stage_news
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/news/bronze_news
            source: WORKSPACE
        - task_key: silver_news
          depends_on:
            - task_key: bronze_news
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/news/silver_news
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
