resources:
  jobs:
    fx_pipeline:
      name: fx_pipeline
      schedule:
        quartz_cron_expression: 20 0 18 * * ?
        timezone_id: Europe/Copenhagen
        pause_status: PAUSED
      tasks:
        - task_key: stage_fx
          webhook_notifications:
            on_failure:
              - id: REPLACE_WITH_NOTIFICATION_DESTINATION_ID
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/fx/stage_fx
            source: WORKSPACE
        - task_key: bronze_fx
          depends_on:
            - task_key: stage_fx
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/fx/bronze_fx
            source: WORKSPACE
        - task_key: silver_fx
          depends_on:
            - task_key: bronze_fx
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/fx/silver_fx
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
