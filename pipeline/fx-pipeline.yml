      name: fx_pipeline
      schedule:
        quartz_cron_expression: 20 0 18 * * ?
        timezone_id: Europe/Copenhagen
        pause_status: UNPAUSED
      tasks:
        - task_key: stage_fx
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/fx/01_stage/stage_fx
            source: WORKSPACE
        - task_key: bronze_fx
          depends_on:
