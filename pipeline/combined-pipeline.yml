resources:
  jobs:
    combined_pipeline:
      name: combined_pipeline
      schedule:
        quartz_cron_expression: 0 0 19 * * ?
        timezone_id: Europe/Copenhagen
        pause_status: UNPAUSED
      tasks:
        # Replace the job_id values below with the actual IDs from the Databricks UI:
        # Workflows → click the job → copy the numeric ID from the URL (/jobs/XXXXX)
        - task_key: run_stocks_pipeline
          run_job_task:
            job_id: 0  # TODO: replace with stock_pipeline job ID

        - task_key: run_fx_pipeline
          run_job_task:
            job_id: 0  # TODO: replace with fx_pipeline job ID

        - task_key: run_macro_pipeline
          run_job_task:
            job_id: 0  # TODO: replace with macro_pipeline job ID

        # --- Stocks gold + predict (existing notebooks) ---
        - task_key: gold_stocks
          depends_on:
            - task_key: run_stocks_pipeline
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/stocks/04_gold/gold_stocks
            source: WORKSPACE

        - task_key: predict_stocks
          depends_on:
            - task_key: gold_stocks
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/stocks/05_predict/predict_tomorrow
            source: WORKSPACE

        # --- Combined gold + predict ---
        - task_key: gold_combined
          depends_on:
            - task_key: gold_stocks
            - task_key: run_fx_pipeline
            - task_key: run_macro_pipeline
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/combined/04_gold/gold_combined
            source: WORKSPACE

        - task_key: predict_combined
          depends_on:
            - task_key: gold_combined
          notebook_task:
            notebook_path: /Workspace/Users/marcus.egelund-muller@devoteam.com/databricks-stocks/notebooks/combined/05_predict/predict_combined
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
